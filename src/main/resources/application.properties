spring.application.name=smart-rate-limiter
# Server
server.port=8081

# H2 Datasource
spring.datasource.url=jdbc:h2:mem:ratelimiter
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Console
spring.h2.console.enabled=true

# JPA
spring.jpa.hibernate.ddl-auto=update

# Redis
# Spring Boot 4 uses spring.data.redis.*
# Default to localhost for local dev; override in Docker with SPRING_DATA_REDIS_HOST
spring.data.redis.host=${SPRING_DATA_REDIS_HOST:localhost}
spring.data.redis.port=${SPRING_DATA_REDIS_PORT:6379}

# JWT
jwt.secret=thisIsSimpleSecretKeyForJwtDemoOnly123456
jwt.expiration=3600000

# Actuator
management.endpoints.web.exposure.include=health
